

background {
    path = screenshot          # 使用桌面截图作为背景:cite[5]
    # path = ~/wallpaper.png   # 或自定义图片（支持PNG/JPG/WEBP）:cite[8]
    color = rgba(0,0,0,0.7)    # 叠加半透明黑色层
    blur_passes = 3             # 模糊强度
    blur_size = 7               # 模糊范围:cite[5]
}

# 时间显示
label {
    position = 0, 80
    text = cmd[update:1000] echo "$(date +"%H:%M")"  # 动态更新时间
    font_size = 64
}
# 密码输入框
input-field {
    position = 0, -20
    placeholder_text = Enter Password...
}
